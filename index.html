<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andreia Matos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script type="module" src="pretext-flow.js"></script>
</head>
<body class="page-home contact-open cv-open">

    <div class="site-chrome">
        <main class="text-block">
            <div class="pretext-bundle">
                <div class="pretext-fit-outer">
                    <div id="pretext-lines" class="pretext-lines"></div>
                </div>
                <div id="contact-inline" class="contact-inline pretext-cv is-open" aria-hidden="false">
                    <div class="pretext-fit-outer contact-pretext-fit-outer">
                        <div id="contact-pretext-lines" class="pretext-lines cv-pretext-sub"></div>
                    </div>
                </div>
                <div id="cv-inline" class="cv-inline pretext-cv is-open" aria-hidden="false">
                    <div class="pretext-fit-outer cv-pretext-birth-wrap">
                        <div id="cv-pretext-birth" class="pretext-lines cv-pretext-sub"></div>
                    </div>
                    <button type="button" class="collapsible" aria-expanded="true" onclick="toggleCollapsible(this)">Education</button>
                    <div class="content is-open">
                        <div class="pretext-fit-outer">
                            <div id="cv-pretext-education" class="pretext-lines cv-pretext-sub"></div>
                        </div>
                    </div>
                    <button type="button" class="collapsible" aria-expanded="true" onclick="toggleCollapsible(this)">Workshops</button>
                    <div class="content is-open">
                        <div class="pretext-fit-outer">
                            <div id="cv-pretext-workshops" class="pretext-lines cv-pretext-sub"></div>
                        </div>
                    </div>
                    <button type="button" class="collapsible" aria-expanded="true" onclick="toggleCollapsible(this)">Residencies</button>
                    <div class="content is-open">
                        <div class="pretext-fit-outer">
                            <div id="cv-pretext-residencies" class="pretext-lines cv-pretext-sub"></div>
                        </div>
                    </div>
                    <button type="button" class="collapsible" aria-expanded="true" onclick="toggleCollapsible(this)">Work experience</button>
                    <div class="content is-open">
                        <div class="pretext-fit-outer">
                            <div id="cv-pretext-work" class="pretext-lines cv-pretext-sub"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="drawings-layer" aria-hidden="true"></div>

</body>
</html>
